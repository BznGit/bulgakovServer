<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/less/style.css">
    <link rel="stylesheet/less" type="text/css" href="../less/style.less">
    <script src="../js/less.js" type="text/javascript"></script>
    <title>Контакты - Игорь Булгаков</title>
</head>

<body>
    <div class="wrap">
        <div class="header">
            <div class="center">
                <div class="logo">
                    <a class="logo-link" href="/">
                        <div class="logo-icon">
                            <img class="icon" src="../svg/logo.svg"/>
                        </div>
                        <div class="logo-text">
                            <div class="name">Игорь Булгаков</div>
                        </div>
                    </a>
                </div>
                <button class="button mobile" id="menu-button">
                    <span class="line"></span>
                    <span class="line"></span>
                    <span class="line"></span>
                </button>
                <div class="menu" id="primary-menu">
                    <div class="menu-list">
                        <div class="menu-item ">
                            <a class="item-link" href="/about">о творчестве</a>
                        </div>
                        <div class="menu-item ">
                            <a class="item-link" href="/gallery">галерея</a>
                        </div>
                        <div class="menu-item ">
                            <a class="item-link" href="/poems">поэзия</a>
                        </div>
                        <div class="menu-item ">
                            <a class="item-link" href="/events">события</a>
                        </div>
                        <div class="menu-item ">
                            <a class="item-link" href="/books">книги</a>
                        </div>
                        <div class="menu-item checked">
                            <a class="item-link" href="/contacts">контакты</a>
                        </div>
                    </div>
                    <div class="cart">
                        <a class="menu-item " href="/cart">
                            <div class="cart-icon">
                                <img class="icon active" src="../svg/cart_w.svg"/>
                                <img class="icon empty" src="../svg/cart_g.svg"/>
                                <div class="cart-value">3</div>
                            </div>
                        </a>
                        <div class="cart-popup ">
                            <img class="pointer" src="../svg/cart_pointer.svg"/>
                            <div class="painting">
                                <img class="image" src="../jpg/picture_01.jpg">
                            </div>
                            <div class="add">Добавлена в заявку</div>
                            <a class="link-more" href="/cart">
                                <div class="text">Перейти к оформлению</div>
                                <img class="icon" src="../svg/more.svg"/>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="main">
            <div class="module contacts">
                <div class="module-center">
                    <div class="module-line contacts">
                        <img class="image" src="../svg/contacts_pic.svg">
                    </div>
                    <h2 class="module-title">Контактная информация</h2>
                    <div class="module-text">
                        <i>Свяжитесь с И. Я. Булгаковым удобным способом</i>
                    </div>
                    <div class="module-content">
                        <div class="box primary contacts">
                            <form class="form send">
                                <label class="form-field error">
                                    <input class="field input" type="text" required/>
                                    <span class="name">*Имя</span>
                                    <span class="error">Некорректно заполнено поле</span>
                                </label>
                                <label class="form-field error">
                                    <input class="field input" type="text" required/>
                                    <span class="name">*Эл. почта</span>
                                    <span class="error">Некорректно заполнено поле</span>
                                </label>
                                <label class="form-field error">
                                    <textarea class="field text" rows="10" required></textarea>
                                    <span class="name">*Текст</span>
                                    <span class="error">Некорректно заполнено поле</span>
                                </label>
                                <label class="form-field checkbox error">
                                    <input class="field" type="checkbox" required/>
                                    <span class="icons">
                                        <img class="icon one" src="../svg/checkbox.svg"/>
                                        <img class="icon two" src="../svg/checkbox_on.svg"/>
                                    </span>
                                    <span class="text">
                                        Подтверждаю согласие
                                        с&nbsp;<a href="/policy">политикой обработки персональных данных</a>
                                    </span>
                                    <span class="error">Некорректно заполнено поле</span>
                                </label>
                                <div class="buttons error">
                                    <button class="button primary yellow" type="submit">отправить</button>
                                    <div class="error">Ошибка. Проверьте правильность заполнения полей.</div>
                                </div>
                            </form>
                            <div class="message">
                                Спасмбо, письмо отправлено
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="footer">
            <div class="center">
                <div class="logo">
                    <a class="logo-link" href="/">
                        <div class="logo-icon">
                            <img class="icon" src="../svg/logo_g.svg"/>
                        </div>
                        <div class="logo-text">
                            <div class="name">Игорь Булгаков</div>
                        </div>
                    </a>
                </div>
                <div class="socials">
                    <a class="item" href="#">
                        <img class="icon one" src="../svg/social_vk.svg"/>
                        <img class="icon two" src="../svg/social_vk_on.svg"/>
                    </a>
                    <a class="item" href="#">
                        <img class="icon one" src="../svg/social_fb.svg"/>
                        <img class="icon two" src="../svg/social_fb_on.svg"/>
                    </a>
                    <a class="item" href="#">
                        <img class="icon one" src="../svg/social_yt.svg"/>
                        <img class="icon two" src="../svg/social_yt_on.svg"/>
                    </a>
                    <a class="item" href="#">
                        <img class="icon one" src="../svg/social_wa.svg"/>
                        <img class="icon two" src="../svg/social_wa_on.svg"/>
                    </a>
                    <a class="item" href="#">
                        <img class="icon one" src="../svg/social_tg.svg"/>
                        <img class="icon two" src="../svg/social_tg_on.svg"/>
                    </a>
                </div>
            </div>
        </div>
    </div>
    <script async src="/js/index.js"></script>
    <script async src="/js/slider-swiper.js"></script>
</body>
</html>
